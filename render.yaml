services:
  # ── Backend: FastAPI ─────────────────────────────────────────
  - type: web
    name: nist-helpdesk-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_render.sh
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nist-helpdesk-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: FAISS_INDEX_PATH
        value: faiss_index/
      - key: DATA_PATH
        value: data/

  # ── Frontend: Streamlit ──────────────────────────────────────
  - type: web
    name: nist-helpdesk-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_URL
        sync: false

# ── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: nist-helpdesk-db
    databaseName: helpdesk
    plan: free
